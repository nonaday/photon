name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; in-progress ones are not cancelled
# so that already-started deploys can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          ADAPTER: static
          PUBLIC_SHOW_INSTANCES_COMMENTS: false
          PUBLIC_SHOW_INSTANCES_USER: false
          PUBLIC_LOCK_TO_INSTANCE: true
          PUBLIC_SHOW_INSTANCES_COMMUNITY: false
          PUBLIC_INSTANCE_URL: tranistan.com
          PUBLIC_VIEW: cozy
          PUBLIC_POST_ICON: combined

      - name: Copy 404 fallback to index
        run: cp build/404.html build/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
